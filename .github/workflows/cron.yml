name: World Cup Digest

on:
  schedule:
    # Every 3 hours (UTC). Adjust as you like:
    # '0 */3 * * *' = 00:00, 03:00, 06:00, 09:00, 12:00, 15:00, 18:00, 21:00 UTC
    - cron: '0 */3 * * *'
  workflow_dispatch:
    # Lets you trigger a run manually from the Actions tab — useful for testing.

jobs:
  send-digest:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # required so we can commit state.json back to the repo
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run World Cup bot
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT: ${{ secrets.RECIPIENT }}
        run: python world_cup_bot.py

      - name: Commit state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json
          git diff --cached --quiet || git commit -m "chore: update bot state [skip ci]"
          git push
